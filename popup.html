<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digg Button Classic</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #18181b;
      color: #e4e4e7;
      overflow-x: hidden;
    }

    .header {
      padding: 6px 10px;
      background: #27272a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #3f3f46;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #ff6f00;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #a1a1aa;
    }

    .mode-toggle span {
      opacity: 0.5;
    }

    .mode-toggle span.active {
      opacity: 1;
      color: #e4e4e7;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 18px;
      background: #3f3f46;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.dark {
      background: #52525b;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fbbf24;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .toggle-switch.dark::after {
      left: 20px;
      background: #6366f1;
    }

    .status {
      padding: 4px 12px;
      background: #1f1f23;
      text-align: center;
      font-size: 10px;
      color: #71717a;
    }

    .status.active {
      color: #22c55e;
      background: #14532d20;
    }

    .status.inactive {
      color: #71717a;
    }

    .settings-row {
      padding: 6px 12px;
      background: #1f1f23;
      border-bottom: 1px solid #3f3f46;
      display: flex;
      align-items: center;
    }

    .setting-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
      color: #a1a1aa;
    }

    .setting-toggle:hover {
      color: #e4e4e7;
    }

    .setting-toggle input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 2px solid #52525b;
      border-radius: 3px;
      background: #18181b;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .setting-toggle input[type="checkbox"]:checked {
      background: #ff6f00;
      border-color: #ff6f00;
    }

    .setting-toggle input[type="checkbox"]:checked::after {
      content: '✓';
      display: block;
      color: white;
      font-size: 10px;
      text-align: center;
      line-height: 10px;
    }

    /* Theme Grid */
    .themes {
      padding: 8px 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .themes h2 {
      display: none;
    }

    .theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px 5px;
      background: #27272a;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .theme-option:hover {
      background: #3f3f46;
    }

    .theme-option.selected {
      border-color: #ff6f00;
      background: #3a2a1a;
    }

    .theme-option input {
      display: none;
    }

    .theme-preview {
      width: 30px;
      height: 30px;
      border-radius: 5px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 9px;
    }

    .theme-info h3 {
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    /* Theme preview styles */
    .preview-classic {
      background: linear-gradient(180deg, #ffb347 0%, #ff6f00 100%);
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .preview-cyberpunk {
      background: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%);
      color: #000;
      text-shadow: 0 0 8px #fff;
    }

    .preview-diggit {
      background: linear-gradient(180deg, #ff4500 0%, #cc3700 100%);
      color: white;
    }

    .preview-minimal {
      background: #1a1a1c;
      border: 1px solid #444;
      color: #ff6f00;
      font-size: 18px;
    }

    .preview-chevron {
      background: #1a1a1c;
      border: 1px solid #444;
      color: #7193ff;
      font-size: 14px;
    }

    .preview-custom {
      background: conic-gradient(from 180deg, #ff6f00, #7193ff, #22c55e, #ff6f00);
      color: white;
      font-size: 10px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* Custom Section */
    .custom-section {
      display: none;
      padding: 8px 10px;
      background: linear-gradient(180deg, #1f1f23 0%, #18181b 100%);
      border-top: 1px solid #3f3f46;
    }

    .custom-section.visible {
      display: block;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      color: #a1a1aa;
      margin: 8px 0 6px;
      letter-spacing: 0.5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3f3f46;
    }

    /* Color Grid */
    .color-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .color-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-pair > label {
      font-size: 9px;
      color: #71717a;
      width: 50px;
      flex-shrink: 0;
    }

    .color-inputs {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid #3f3f46;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .swatch:hover {
      border-color: #52525b;
    }

    .swatch.arrow-swatch {
      background: #27272a;
    }

    .swatch.arrow-swatch svg {
      flex-shrink: 0;
      pointer-events: none;
    }

    .swatch.bg-swatch {
      width: 24px;
      height: 24px;
      border-style: dashed;
    }

    .swatch.bg-swatch.empty {
      background: repeating-linear-gradient(
        45deg,
        #27272a,
        #27272a 3px,
        #3f3f46 3px,
        #3f3f46 6px
      ) !important;
    }

    .bg-label {
      font-size: 8px;
      color: #52525b;
      pointer-events: none;
    }

    .color-picker-input {
      display: none;
    }

    .hex-input {
      width: 58px;
      padding: 3px 4px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 3px;
      color: #e4e4e7;
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 9px;
      text-align: center;
      text-transform: uppercase;
    }

    .hex-input:focus {
      outline: none;
      border-color: #ff6f00;
      background: #2d2d32;
    }

    /* Palette Input */
    .palette-input {
      width: 100%;
      padding: 6px 8px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      color: #e4e4e7;
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 10px;
      transition: all 0.15s ease;
      margin-top: 4px;
    }

    .palette-input:focus {
      outline: none;
      border-color: #ff6f00;
      background: #2d2d32;
    }

    /* Presets */
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .preset-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 5px 3px;
      font-size: 8px;
      font-weight: 500;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .preset-btn:hover {
      background: #3f3f46;
      border-color: #52525b;
      color: #e4e4e7;
    }

    .preset-colors {
      display: flex;
      gap: 2px;
    }

    .preset-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.2);
    }

    /* Options */
    .options-box {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      background: #27272a;
      border-radius: 4px;
      padding: 6px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .option-group-label {
      font-size: 8px;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .option-group-items {
      display: flex;
      gap: 8px;
    }

    .option-toggle {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #a1a1aa;
      cursor: pointer;
    }

    .option-toggle:has(input:checked) {
      color: #e4e4e7;
    }

    .option-toggle input[type="radio"],
    .option-toggle input[type="checkbox"] {
      appearance: none;
      width: 10px;
      height: 10px;
      border: 2px solid #52525b;
      border-radius: 50%;
      background: #18181b;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .option-toggle input[type="checkbox"] {
      border-radius: 2px;
    }

    .option-toggle input[type="radio"]:checked,
    .option-toggle input[type="checkbox"]:checked {
      background: #ff6f00;
      border-color: #ff6f00;
    }

    /* Color Picker Popup */
    .color-picker-popup {
      display: none;
      position: absolute;
      z-index: 1000;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      width: 180px;
    }

    .color-picker-popup.visible {
      display: block;
    }

    .cp-sv-wrapper {
      position: relative;
      width: 100%;
      height: 100px;
      border-radius: 4px;
      overflow: hidden;
      cursor: crosshair;
    }

    .cp-sv-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .cp-sv-cursor {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 2px rgba(0,0,0,0.5), inset 0 0 2px rgba(0,0,0,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .cp-hue-wrapper {
      position: relative;
      width: 100%;
      height: 14px;
      margin-top: 8px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }

    .cp-hue-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(to right,
        #ff0000 0%, #ffff00 17%, #00ff00 33%,
        #00ffff 50%, #0000ff 67%, #ff00ff 83%, #ff0000 100%);
    }

    .cp-hue-cursor {
      position: absolute;
      top: 0;
      width: 4px;
      height: 100%;
      background: white;
      border: 1px solid #333;
      border-radius: 1px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .cp-preview-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .cp-preview {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid #3f3f46;
      flex-shrink: 0;
    }

    .cp-hex-input {
      flex: 1;
      padding: 5px 6px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      color: #e4e4e7;
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .cp-hex-input:focus {
      outline: none;
      border-color: #ff6f00;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Digg Button Classic</h1>
    <div class="mode-toggle">
      <span id="lightLabel" class="active">Light</span>
      <div id="darkModeToggle" class="toggle-switch"></div>
      <span id="darkLabel">Dark</span>
    </div>
  </div>

  <div id="status" class="status">Checking...</div>

  <div class="settings-row">
    <label class="setting-toggle">
      <input type="checkbox" id="collapseComments">
      <span class="setting-label">Auto-collapse comments</span>
    </label>
  </div>

  <div class="themes">
    <h2>Select Theme</h2>

    <label class="theme-option" data-theme="minimal">
      <input type="radio" name="theme" value="minimal">
      <div class="theme-preview preview-minimal">&uarr;</div>
      <div class="theme-info"><h3>Minimal</h3></div>
    </label>

    <label class="theme-option" data-theme="classic">
      <input type="radio" name="theme" value="classic">
      <div class="theme-preview preview-classic">digg</div>
      <div class="theme-info"><h3>Classic</h3></div>
    </label>

    <label class="theme-option" data-theme="diggit">
      <input type="radio" name="theme" value="diggit">
      <div class="theme-preview preview-diggit">&uarr;</div>
      <div class="theme-info"><h3>Diggit</h3></div>
    </label>

    <label class="theme-option" data-theme="chevron">
      <input type="radio" name="theme" value="chevron">
      <div class="theme-preview preview-chevron">&and;</div>
      <div class="theme-info"><h3>Chevron</h3></div>
    </label>

    <label class="theme-option" data-theme="cyberpunk">
      <input type="radio" name="theme" value="cyberpunk">
      <div class="theme-preview preview-cyberpunk">DIGG</div>
      <div class="theme-info"><h3>Cyber</h3></div>
    </label>

    <label class="theme-option" data-theme="custom">
      <input type="radio" name="theme" value="custom">
      <div class="theme-preview preview-custom">DIY</div>
      <div class="theme-info"><h3>Custom</h3></div>
    </label>
  </div>

  <div id="customSection" class="custom-section">
    <div class="section-title">Colors <span style="opacity:0.5;font-size:8px;font-weight:400">(arrow / background)</span></div>
    <div class="color-grid">
      <div class="color-pair">
        <label>Unvoted</label>
        <div class="color-inputs">
          <div id="swatchNeutral" class="swatch arrow-swatch" data-color-target="neutral">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="18" height="18" style="color: #878a8c;"><path fill="currentColor" d="M12 16.77 21 19l-.204-.438a66.8 66.8 0 0 0-7.785-12.759L12 4.5l-1.011 1.303a66.8 66.8 0 0 0-7.785 12.76L3 19l9-2.23Z"></path></svg>
            <input type="color" id="colorNeutral" class="color-picker-input" value="#878a8c">
          </div>
          <input type="text" id="hexNeutral" class="hex-input" value="#878a8c" maxlength="7" spellcheck="false">
          <div id="swatchNeutralBg" class="swatch bg-swatch empty" data-color-target="neutralBg">
            <span class="bg-label">auto</span>
            <input type="color" id="colorNeutralBg" class="color-picker-input" value="#27272a">
          </div>
          <input type="text" id="hexNeutralBg" class="hex-input" value="" maxlength="7" spellcheck="false" placeholder="auto">
        </div>
      </div>
      <div class="color-pair">
        <label>Dugg</label>
        <div class="color-inputs">
          <div id="swatchUp" class="swatch arrow-swatch" data-color-target="up">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="18" height="18" style="color: #ff6f00;"><path fill="currentColor" d="M12 16.77 21 19l-.204-.438a66.8 66.8 0 0 0-7.785-12.759L12 4.5l-1.011 1.303a66.8 66.8 0 0 0-7.785 12.76L3 19l9-2.23Z"></path></svg>
            <input type="color" id="colorUp" class="color-picker-input" value="#ff6f00">
          </div>
          <input type="text" id="hexUp" class="hex-input" value="#ff6f00" maxlength="7" spellcheck="false">
          <div id="swatchUpBg" class="swatch bg-swatch empty" data-color-target="upBg">
            <span class="bg-label">auto</span>
            <input type="color" id="colorUpBg" class="color-picker-input" value="#27272a">
          </div>
          <input type="text" id="hexUpBg" class="hex-input" value="" maxlength="7" spellcheck="false" placeholder="auto">
        </div>
      </div>
      <div class="color-pair">
        <label>Buried</label>
        <div class="color-inputs">
          <div id="swatchDown" class="swatch arrow-swatch" data-color-target="down">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="18" height="18" style="color: #7193ff; transform: rotate(180deg);"><path fill="currentColor" d="M12 16.77 21 19l-.204-.438a66.8 66.8 0 0 0-7.785-12.759L12 4.5l-1.011 1.303a66.8 66.8 0 0 0-7.785 12.76L3 19l9-2.23Z"></path></svg>
            <input type="color" id="colorDown" class="color-picker-input" value="#7193ff">
          </div>
          <input type="text" id="hexDown" class="hex-input" value="#7193ff" maxlength="7" spellcheck="false">
          <div id="swatchDownBg" class="swatch bg-swatch empty" data-color-target="downBg">
            <span class="bg-label">auto</span>
            <input type="color" id="colorDownBg" class="color-picker-input" value="#27272a">
          </div>
          <input type="text" id="hexDownBg" class="hex-input" value="" maxlength="7" spellcheck="false" placeholder="auto">
        </div>
      </div>
    </div>

    <div class="section-title">Quick Presets</div>
    <div class="presets">
      <button class="preset-btn" data-palette-light="#ff4500,#7193ff,#878a8c" data-palette-dark="#ff5722,#81aaff,#a0a0a0,#1a1a1b,#1a1a1b,#1a1a1b">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#ff4500"></span>
          <span class="preset-dot" style="background:#7193ff"></span>
          <span class="preset-dot" style="background:#878a8c"></span>
        </span>
        Reddit
      </button>
      <button class="preset-btn" data-palette-light="#ff6f00,#4a90d9,#666666" data-palette-dark="#ff8c00,#5a9fe9,#999999,#1a1a1a,#1a1a1a,#1a1a1a">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#ff6f00"></span>
          <span class="preset-dot" style="background:#4a90d9"></span>
          <span class="preset-dot" style="background:#888888"></span>
        </span>
        Digg OG
      </button>
      <button class="preset-btn" data-palette-light="#16a34a,#dc2626,#6b7280" data-palette-dark="#4ade80,#f87171,#d1d5db,#052e16,#450a0a,#111827">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#16a34a"></span>
          <span class="preset-dot" style="background:#dc2626"></span>
          <span class="preset-dot" style="background:#6b7280"></span>
        </span>
        Stonks
      </button>
      <button class="preset-btn" data-palette-light="#a855f7,#ec4899,#6366f1" data-palette-dark="#e879f9,#f472b6,#c4b5fd,#3b0764,#500724,#1e1b4b">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#a855f7"></span>
          <span class="preset-dot" style="background:#ec4899"></span>
          <span class="preset-dot" style="background:#6366f1"></span>
        </span>
        Vapor
      </button>
      <button class="preset-btn" data-palette-light="#d97706,#ea580c,#78716c" data-palette-dark="#fbbf24,#fb923c,#e7e5e4,#422006,#431407,#1c1917">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#d97706"></span>
          <span class="preset-dot" style="background:#ea580c"></span>
          <span class="preset-dot" style="background:#78716c"></span>
        </span>
        Warm
      </button>
      <button class="preset-btn" data-palette-light="#0891b2,#7c3aed,#64748b" data-palette-dark="#22d3ee,#a78bfa,#cbd5e1,#0c4a6e,#2e1065,#0f172a">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#0891b2"></span>
          <span class="preset-dot" style="background:#7c3aed"></span>
          <span class="preset-dot" style="background:#64748b"></span>
        </span>
        Cool
      </button>
      <button class="preset-btn" data-palette-light="#18181b,#71717a,#a1a1aa" data-palette-dark="#ffffff,#a1a1aa,#71717a,#18181b,#18181b,#27272a">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#18181b"></span>
          <span class="preset-dot" style="background:#71717a"></span>
          <span class="preset-dot" style="background:#a1a1aa"></span>
        </span>
        Mono
      </button>
      <button class="preset-btn" data-palette-light="#cc0000,#cccc00,#009900;bold,outline" data-palette-dark="#ffff00,#ff0000,#00ff00,#330000,#333300,#000033;bold,glow,outline">
        <span class="preset-colors">
          <span class="preset-dot" style="background:#cc0000"></span>
          <span class="preset-dot" style="background:#cccc00"></span>
          <span class="preset-dot" style="background:#009900"></span>
        </span>
        HotDog
      </button>
    </div>

    <div class="section-title">Options</div>
    <div class="options-box">
      <div class="option-group">
        <span class="option-group-label">Layout</span>
        <div class="option-group-items">
          <label class="option-toggle"><input type="radio" name="layout" id="layoutMinimal" checked> Inline</label>
          <label class="option-toggle"><input type="radio" name="layout" id="layoutClassic"> Side</label>
        </div>
      </div>
      <div class="option-group">
        <span class="option-group-label">Style</span>
        <div class="option-group-items">
          <label class="option-toggle"><input type="radio" name="style" id="styleDefault" checked> Arrow</label>
          <label class="option-toggle"><input type="radio" name="style" id="styleChevron"> Chev</label>
        </div>
      </div>
      <div class="option-group">
        <span class="option-group-label">Effects</span>
        <div class="option-group-items">
          <label class="option-toggle"><input type="checkbox" id="effectGlow"> ✨</label>
          <label class="option-toggle"><input type="checkbox" id="effectBold"> ⬆</label>
          <label class="option-toggle"><input type="checkbox" id="effectOutline"> ◯</label>
        </div>
      </div>
    </div>

    <input type="text" id="paletteInput" class="palette-input" placeholder="#dugg,#buried,#unvoted;effects" value="#ff6f00,#7193ff,#878a8c">
  </div>

  <!-- Color Picker Popup -->
  <div id="colorPickerPopup" class="color-picker-popup">
    <div class="cp-sv-wrapper">
      <canvas class="cp-sv-canvas" width="164" height="100"></canvas>
      <div class="cp-sv-cursor"></div>
    </div>
    <div class="cp-hue-wrapper">
      <div class="cp-hue-bar"></div>
      <div class="cp-hue-cursor"></div>
    </div>
    <div class="cp-preview-row">
      <div class="cp-preview"></div>
      <input type="text" class="cp-hex-input" maxlength="7" spellcheck="false">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
